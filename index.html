<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandanten-Onboarding — Lerner Lachenmaier & Partner</title>
<style>
:root{
  --primary:#1a3a5c;--primary-d:#0f2540;--primary-dd:#0a1a2e;
  --primary-l:#e8f0f8;--primary-m:#8ab0d4;
  --teal:#1D9E75;--teal-d:#0F6E56;--teal-dd:#085041;
  --teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --blue-l:#E6F1FB;--blue-b:#85B7EB;--blue-d:#0C447C;
  --amber-l:#FAEEDA;--amber-b:#FAC775;--amber-d:#633806;
  --red-l:#FCEBEB;--red-b:#F09595;--red-d:#A32D2D;
  --gray:#888;--border:#ddd;--bg:#f5f5f2;--white:#fff;
  --radius:8px;--radius-lg:12px;
  --shadow:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.1);
}
[data-theme="dark"]{--bg:#1a1a1a;--white:#242424;--border:#333;--gray:#999;--primary-l:#1a2a3a;color:#e0e0e0}
[data-theme="dark"] body{color:#e0e0e0}
[data-theme="dark"] .field input,[data-theme="dark"] .field select,[data-theme="dark"] .field textarea{color:#e0e0e0;background:var(--white)}
[data-theme="dark"] .type-card h3,[data-theme="dark"] .kind-title{color:#e0e0e0}
[data-theme="dark"] .sum-v{color:#e0e0e0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:#1a1a1a;font-size:15px;transition:background .3s,color .3s}
.page{max-width:880px;margin:0 auto;padding:24px 16px 80px}

/* Header */
.kanzlei-header{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:18px 24px;margin-bottom:18px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
.kanzlei-logo-img{height:74px;width:auto;flex-shrink:0;background:#fff;padding:7px 12px;border-radius:var(--radius);display:block}
.kanzlei-titles{padding-left:20px;border-left:1px solid var(--border)}
.kanzlei-titles h1{font-size:16px;font-weight:700;color:var(--primary-dd);letter-spacing:0}
.kanzlei-titles p{font-size:12px;color:var(--gray);margin-top:3px}
[data-theme="dark"] .kanzlei-titles h1{color:#e8e8e8}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.theme-btn{border:1px solid var(--border);border-radius:var(--radius);padding:7px 11px;font-size:13px;cursor:pointer;background:var(--white);color:var(--gray);font-family:inherit;transition:all .2s}
.theme-btn:hover{border-color:var(--primary);color:var(--primary)}

/* Steps nav */
.steps-nav{display:flex;gap:0;margin-bottom:16px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;overflow-x:auto;box-shadow:var(--shadow)}
.step-btn{padding:11px 14px;font-size:11px;cursor:pointer;border:none;background:none;color:var(--gray);border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;font-weight:500;transition:all .15s}
.step-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-l)}
.step-btn.done{color:var(--teal-d)}
.step-btn.done::before{content:'✓ ';font-size:10px}
.step-btn.has-error{border-bottom-color:var(--red-d)!important;color:var(--red-d)!important}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--border);color:var(--gray);font-size:10px;margin-right:4px;font-weight:700}
.step-btn.active .step-num{background:var(--primary);color:#fff}
.step-btn.done .step-num{background:var(--teal);color:#fff}

/* Progress */
.progress-wrap{margin-bottom:18px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:5px}
.progress-track{height:5px;background:#e8e8e5;border-radius:3px;overflow:hidden}
.progress-fill{height:5px;background:var(--primary);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* Sections */
.section{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.section-title svg{width:14px;height:14px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Grid & fields */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col2{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#555;font-weight:600;display:flex;align-items:center;gap:4px}
.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;font-size:14px;background:var(--white);color:#1a1a1a;width:100%;font-family:inherit;transition:all .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.field input.error,.field select.error,.field textarea.error{border-color:var(--red-d);background:var(--red-l)}
.field textarea{resize:vertical;min-height:80px}
.field .hint{font-size:11px;color:var(--gray);margin-top:1px}
.req{color:var(--primary)}
.err-msg{color:var(--red-d);font-size:11px;margin-top:2px;display:none}
.err-msg.show{display:block}

/* Toggle buttons */
.tgl{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.tb{border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:12px;cursor:pointer;background:var(--white);color:#333;font-family:inherit;font-weight:500;transition:all .15s}
.tb:hover{border-color:var(--primary);transform:translateY(-1px)}
.tb.on{border-color:var(--primary);background:var(--primary-l);color:var(--primary-dd);font-weight:600;box-shadow:0 2px 4px rgba(26,58,92,0.15)}
.tb.error{border-color:var(--red-d);background:var(--red-l)}

/* Type cards */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.type-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius-lg);padding:24px;cursor:pointer;text-align:left;transition:all .2s;font-family:inherit;position:relative;overflow:hidden}
.type-card:hover{border-color:var(--primary-m);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.type-card.active{border-color:var(--primary);background:var(--primary-l)}
.type-card svg{width:30px;height:30px;stroke:var(--primary);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin-bottom:10px}
.type-card h3{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:5px}
.type-card p{font-size:13px;color:var(--gray);line-height:1.4}
.type-card .check-icon{position:absolute;top:14px;right:14px;width:22px;height:22px;background:var(--primary);color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:13px}
.type-card.active .check-icon{display:flex}

/* Info/warn/error boxes */
.infobox{background:var(--blue-l);border:1px solid var(--blue-b);border-radius:var(--radius);padding:11px 13px;font-size:12px;color:var(--blue-d);display:flex;gap:9px;align-items:flex-start;margin-bottom:14px}
.infobox svg{width:15px;height:15px;stroke:var(--blue-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}
.warnbox{background:var(--amber-l);border:1px solid var(--amber-b);border-radius:var(--radius);padding:11px 13px;font-size:12px;color:var(--amber-d);display:flex;gap:9px;align-items:flex-start;margin-bottom:14px}
.warnbox svg{width:15px;height:15px;stroke:var(--amber-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}
.errorbox{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--radius);padding:11px 13px;font-size:12px;color:var(--red-d);display:flex;gap:9px;align-items:flex-start;margin-bottom:14px}
.errorbox svg{width:15px;height:15px;stroke:var(--red-d);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px}

/* Person cards (Gesellschafter / Vertreter) */
.person-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px;background:var(--white);transition:all .2s}
.person-card:hover{border-color:var(--primary-m);box-shadow:var(--shadow)}
.person-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.person-title{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}

/* Child cards */
.kind-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px;background:var(--white);transition:all .2s}
.kind-card:hover{border-color:var(--primary-m);box-shadow:var(--shadow)}
.kind-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kind-title{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
.b-teal{background:var(--teal-l);color:var(--teal-dd)}
.b-blue{background:var(--blue-l);color:var(--blue-d)}
.b-amber{background:var(--amber-l);color:var(--amber-d)}
.del-btn{border:1px solid var(--border);border-radius:var(--radius);padding:5px 11px;font-size:12px;cursor:pointer;background:var(--white);color:var(--gray);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px}
.del-btn:hover{border-color:var(--red-b);color:var(--red-d);background:var(--red-l)}
.add-btn{border:2px dashed var(--primary-m);border-radius:var(--radius);padding:11px 16px;font-size:14px;cursor:pointer;background:none;color:var(--primary);font-family:inherit;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:6px;width:100%;justify-content:center;transition:all .2s}
.add-btn:hover{background:var(--primary-l);border-color:var(--primary);transform:translateY(-1px)}

/* Nav bar */
.nav-bar{display:flex;gap:10px;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.btn-primary{flex:1;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 2px 8px rgba(26,58,92,0.3)}
.btn-primary:hover{background:var(--primary-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,58,92,0.4)}
.btn-secondary{border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:13px;cursor:pointer;background:var(--white);color:#333;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px)}
.btn-print{border:1px solid var(--primary);border-radius:var(--radius);padding:10px 18px;font-size:13px;cursor:pointer;background:var(--primary-l);color:var(--primary);font-family:inherit;font-weight:600;transition:all .2s}
.btn-print:hover{background:var(--primary);color:#fff}
.btn-export{border:1px solid var(--blue-b);border-radius:var(--radius);padding:10px 18px;font-size:13px;cursor:pointer;background:var(--blue-l);color:var(--blue-d);font-family:inherit;font-weight:600;transition:all .2s}
.btn-export:hover{background:var(--blue-b);color:#fff}

/* Summary */
.sum-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;background:var(--white);box-shadow:var(--shadow)}
.sum-head{background:var(--primary-l);padding:11px 16px;font-size:11px;font-weight:700;color:var(--primary-dd);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #f0f0ee;font-size:13px;transition:background .15s}
.sum-row:hover{background:rgba(26,58,92,0.03)}
.sum-row:last-child{border-bottom:none}
.sum-k{color:var(--gray);font-weight:500}
.sum-v{font-weight:600;color:#1a1a1a;text-align:right;max-width:55%;word-break:break-word}
.sum-v.empty{color:var(--gray);font-style:italic}

/* Done banner */
.done-banner{background:var(--primary-l);border:1px solid var(--primary-m);border-radius:var(--radius-lg);padding:26px;text-align:center;margin-bottom:18px;animation:slideDown .4s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.done-banner .check{font-size:40px;display:block;margin-bottom:8px}
.done-banner h2{font-size:17px;font-weight:700;color:var(--primary-dd)}
.done-banner p{font-size:13px;color:var(--primary);margin-top:5px}

/* Validation summary */
.val-summary{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--red-d);margin-bottom:14px}
.val-summary strong{display:block;margin-bottom:6px;font-size:13px}
.val-summary ul{padding-left:18px;line-height:1.8}
.val-summary a{color:var(--red-d);font-weight:600;cursor:pointer;text-decoration:underline}

/* Autosave & undo */
.autosave-indicator{position:fixed;bottom:18px;right:18px;background:var(--teal);color:#fff;padding:9px 14px;border-radius:var(--radius);font-size:12px;font-weight:500;display:none;align-items:center;gap:7px;box-shadow:var(--shadow-lg);z-index:1000;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.autosave-indicator.show{display:flex}
.autosave-indicator.saving{background:var(--gray)}
.undo-bar{position:fixed;bottom:18px;left:18px;display:flex;gap:5px;z-index:1000}
.undo-btn{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:7px 11px;font-size:12px;cursor:pointer;color:var(--gray);font-family:inherit;transition:all .2s;box-shadow:var(--shadow)}
.undo-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.undo-btn:disabled{opacity:.4;cursor:not-allowed}

.print-footer{display:none;position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:9px;color:#888;padding:7px 0;border-top:1px solid #ddd;background:#fff}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:14mm 14mm 20mm}
  .steps-nav,.nav-bar,.btn-primary,.btn-secondary,.btn-print,.btn-export,.no-print,.autosave-indicator,.undo-bar,.theme-btn,.progress-wrap,.done-banner,.val-summary,.infobox,.warnbox,.errorbox{display:none!important}
  body{background:#fff;font-size:12px}
  .page{max-width:100%;padding:0}
  .kanzlei-header{border:none;box-shadow:none;border-radius:0;padding:0 0 12px;margin-bottom:16px;border-bottom:2px solid var(--primary)}
  .kanzlei-logo-img{padding:0}
  .section,.sum-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .sum-head{background:var(--primary-l)!important;color:var(--primary-dd)!important}
  .print-footer{display:block!important}
}
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  .col2{grid-column:1}
  .type-grid{grid-template-columns:1fr}
  .steps-nav{flex-wrap:nowrap}
  .kanzlei-header{flex-wrap:wrap}
  .header-actions{width:100%;justify-content:flex-end;margin-top:8px}
  .sum-row{flex-direction:column;align-items:flex-start;gap:4px}
  .sum-v{max-width:100%;text-align:left}
  .undo-bar{display:none}
}
</style>
</head>

// VALIDATORS
const V = {
  email: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
  iban: v => {
    var s = v.replace(/\s/g,'').toUpperCase();
    if(s.length<15||s.length>34) return false;
    var r=s.slice(4)+s.slice(0,4);
    var n=Array.from(r).map(c=>/[A-Z]/.test(c)?(c.charCodeAt(0)-55).toString():c).join('');
    var rem=n;
    while(rem.length>2) rem=(parseInt(rem.slice(0,9),10)%97).toString()+rem.slice(9);
    return parseInt(rem,10)%97===1;
  },
  steuerid: v => /^\d{11}$/.test(v.replace(/\s/g,'')),
  plz: v => /^\d{5}$/.test(v.replace(/\s/g,'')),
  phone: v => /^[\+0-9\s\-\(\)]{6,}$/.test(v),
  required: v => v && v.toString().trim().length > 0
};

const REQUIRED_FIELDS = {
  'Persönliche Daten': [{key:'anrede',label:'Anrede',v:'required'},{key:'vorname',label:'Vorname',v:'required'},{key:'nachname',label:'Nachname',v:'required'}],
  'Unternehmen': [{key:'firmenname',label:'Firmenname',v:'required'},{key:'rechtsform',label:'Rechtsform',v:'required'}],
  'Ansprechpartner': [{key:'ap_vn',label:'Vorname Ansprechpartner',v:'required'},{key:'ap_nn',label:'Nachname Ansprechpartner',v:'required'}],
  'Kommunikation': [{key:'email',label:'E-Mail',v:'email'}],
  'Adresse & Finanzamt': [{key:'strasse',label:'Straße & Hausnummer',v:'required'},{key:'plz',label:'PLZ',v:'plz'},{key:'ort',label:'Ort',v:'required'}],
  'Bankverbindung': [{key:'iban',label:'IBAN',v:'iban'}]
};

function validateStep(n){ var f=REQUIRED_FIELDS[n]||[],e={}; f.forEach(function(x){if(!V[x.v](D[x.key]||''))e[x.key]=x.label;}); return e; }
function validateAll(){ var a={}; steps().forEach(function(n){ Object.assign(a,validateStep(n)); }); return a; }

// HISTORY
function pushHistory(){
  if(isUndoing) return;
  var snap=JSON.stringify({data:D,step:currentStep});
  if(hist[histIdx]===snap) return;
  hist=hist.slice(0,histIdx+1); hist.push(snap);
  if(hist.length>HISTORY_LIMIT) hist.shift(); else histIdx++;
  updateUndoBtns();
}
function undo(){ if(histIdx>0){isUndoing=true;histIdx--;var s=JSON.parse(hist[histIdx]);D=s.data;currentStep=s.step;renderAll();showAutosave('Rückgängig');updateUndoBtns();setTimeout(()=>{isUndoing=false;},50);} }
function redo(){ if(histIdx<hist.length-1){isUndoing=true;histIdx++;var s=JSON.parse(hist[histIdx]);D=s.data;currentStep=s.step;renderAll();showAutosave('Wiederhergestellt');updateUndoBtns();setTimeout(()=>{isUndoing=false;},50);} }
function updateUndoBtns(){ document.getElementById('undoBtn').disabled=histIdx<=0; document.getElementById('redoBtn').disabled=histIdx>=hist.length-1; }

// STORAGE
function saveToStorage(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify({data:D,step:currentStep,ts:Date.now()}));showAutosave('Gespeichert');}catch(e){} }
function loadFromStorage(){ try{var raw=localStorage.getItem(STORAGE_KEY);if(raw){var s=JSON.parse(raw);if(s.data)D=s.data;if(s.step!==undefined)currentStep=s.step;return true;}}catch(e){}return false; }
function confirmReset(){ if(confirm('Alle Eingaben löschen und neu starten?')){localStorage.removeItem(STORAGE_KEY);D={};currentStep=0;hist=[];histIdx=-1;renderAll();} }
var autosaveTO;
function debouncedSave(){ clearTimeout(autosaveTO);showAutosave('Speichern...','saving');autosaveTO=setTimeout(()=>{saveToStorage();pushHistory();},600); }
function showAutosave(text,type){ var el=document.getElementById('autosaveInd');el.className='autosave-indicator show '+(type||'saved');document.getElementById('autosaveText').textContent=text;if((type||'saved')!=='saving')setTimeout(()=>{el.classList.remove('show');},2000); }

// FIELD HELPERS
function fld(label,key,type,placeholder,opts,req,validator,hint){
  type=type||'text';placeholder=placeholder||'';req=req||false;
  var val=D[key]||'';
  var hasErr=D._err&&D._err[key];
  var errMsg=hasErr?getErrMsg(validator,label):'';
  var chg='updateField(\''+key+'\',this.value)'+(validator?';validateField(\''+key+'\',this.value,\''+validator+'\')':'');
  var inp;
  if(type==='select'){
    var o='<option value="">— wählen —</option>';
    (opts||[]).forEach(v=>o+='<option value="'+v+'" '+(val===v?'selected':'')+'>'+v+'</option>');
    inp='<select id="fld_'+key+'" class="'+(hasErr?'error':'')+'" onchange="'+chg+'">'+o+'</select>';
  } else if(type==='textarea'){
    inp='<textarea id="fld_'+key+'" class="'+(hasErr?'error':'')+'" placeholder="'+placeholder+'" onchange="'+chg+'">'+val+'</textarea>';
  } else {
    inp='<input type="'+type+'" id="fld_'+key+'" class="'+(hasErr?'error':'')+'" value="'+esc(val)+'" placeholder="'+placeholder+'" onchange="'+chg+'" onblur="'+(validator?'validateField(\''+key+'\',this.value,\''+validator+'\')':'')+'">';
  }
  var r=req?'<span class="req">*</span>':'';
  var h=hint?'<div class="hint">'+hint+'</div>':'';
  var e='<div class="err-msg '+(hasErr?'show':'')+'" id="err_'+key+'">'+errMsg+'</div>';
  return '<div class="field"><label>'+label+r+'</label>'+inp+h+e+'</div>';
}
function getErrMsg(v,l){ if(v==='email')return 'Bitte gültige E-Mail eingeben';if(v==='iban')return 'Ungültige IBAN';if(v==='steuerid')return 'Steuer-ID: 11 Ziffern';if(v==='plz')return 'PLZ: 5 Ziffern';return l+' ist Pflichtfeld'; }
function esc(v){ return String(v).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function updateField(key,value){ D[key]=value;if(D._err)delete D._err[key];debouncedSave(); }
function validateField(key,value,validator){
  if(!validator)return true;
  var valid=V[validator]?V[validator](value):true;
  if(!valid){if(!D._err)D._err={};D._err[key]=true;}else if(D._err)delete D._err[key];
  var errEl=document.getElementById('err_'+key);
  var fldEl=document.getElementById('fld_'+key);
  if(errEl){errEl.textContent=valid?'':getErrMsg(validator,key);errEl.className='err-msg '+(valid?'':'show');}
  if(fldEl)fldEl.classList.toggle('error',!valid);
  return valid;
}
function tgl(label,key,options,multi,req){
  multi=multi||false;req=req||false;
  var val=D[key]||(multi?[]:'');
  var hasErr=D._err&&D._err[key];
  var btns='';
  options.forEach(function(v){
    var on=multi?(Array.isArray(val)&&val.indexOf(v)>-1):val===v;
    var click=multi?'onclick="toggleArr(\''+key+'\',\''+v+'\');debouncedSave()"':'onclick="D[\''+key+'\']=\''+v+'\';if(D._err)delete D._err[\''+key+'\'];debouncedSave();renderAll()"';
    btns+='<button class="tb '+(on?'on ':'')+(hasErr?'error':'')+'" '+click+'>'+v+'</button>';
  });
  var r=req?'<span class="req">*</span>':'';
  var e=hasErr?'<div class="err-msg show">Bitte mindestens eine Option wählen</div>':'';
  return '<div class="field col2"><label>'+label+r+'</label><div class="tgl">'+btns+'</div>'+e+'</div>';
}
function toggleArr(key,val){ if(!D[key])D[key]=[];var i=D[key].indexOf(val);if(i>-1)D[key].splice(i,1);else D[key].push(val);renderAll(); }
function toggleKind(idx,val){ if(!D.kinder[idx].positionen)D.kinder[idx].positionen=[];var i=D.kinder[idx].positionen.indexOf(val);if(i>-1)D.kinder[idx].positionen.splice(i,1);else D.kinder[idx].positionen.push(val);renderAll(); }

function infobox(t){ return '<div class="infobox">'+SVG.info+'<span>'+t+'</span></div>'; }

  var kinder=D.kinder||[];
  for(var idx=0;idx<kinder.length;idx++){
    var k=kinder[idx];
    var alter=k.geb?Math.floor((Date.now()-new Date(k.geb))/(1000*60*60*24*365.25)):null;

function pageSummary(){
  var isF=D.mtype==='firma';

  var html='';
  if(errKeys.length>0){
    html+='<div class="val-summary"><strong>⚠️ Bitte prüfen Sie folgende Pflichtfelder:</strong><ul>';

    html+='</ul></div>';
  }
  html+='<div class="done-banner"><span class="check">✅</span><h2>Onboarding vollständig erfasst</h2><p>Bitte prüfen, drucken / als PDF speichern und zur Kanzleiakte nehmen.</p></div>';

  row('Typ',isF?'Unternehmen':'Privatperson')+row('Name',name)+
  (isF?row('Rechtsform',D.rechtsform)+row('Branche',D.branche):'')+
  (!isF?row('Familienstand',D.famstand)+row('Beruf / Tätigkeit',D.beruf)+row('Staatsangehörigkeit',D.staat):'')+

  row('E-Mail',D.email)+row('Telefon',D.tel)+row('Mobil',D.mobil)+
  row('Kommunikationsweg',(D.komm||[]).join(', ')||null)+
  row('Korrespondenzsprache',(D.sprache||[]).join(', ')||null)+

  row('Adresse',[D.strasse,D.plz,D.ort].filter(Boolean).join(', ')||null)+
  row('Bundesland',D.bula)+row('Land',D.land)+row('Finanzamt',D.fa)+
  row('Steuernummer',D.steuernr_fa||D.steuernr_firm)+row('Steuer-ID',D.steuerid||D.steuerid_fa)+
  row('USt-ID',D.ustid||D.ustid_fa)+row('Steuerarten',(D.steuerart||[]).join(', ')||null)+
  row('USt-Rhythmus',D.ust_rhythmus)+row('Dauerfristverlängerung',D.dauerfrist)+'</div>';

  if(isF){
    var gs=D.gesellschafter||[];
    var vt=D.vertreter||[];
    if(gs.length>0){
      html+='<div class="sum-card"><div class="sum-head">👥 Gesellschafter</div>';

    }

  row('Kontoinhaber',D.ki)+row('IBAN',D.iban)+row('BIC',D.bic)+row('Kreditinstitut',D.bank)+row('SEPA-Lastschrift',D.sepa)+'</div>';

  html+='<div class="sum-card"><div class="sum-head">✅ Leistungen</div>'+

  (D.notizen?row('Anmerkungen',D.notizen):'')+'</div>';

function row(label,val){
  var v=val&&String(val).trim()?String(val):'<span class="empty">—</span>';
  return '<div class="sum-row"><span class="sum-k">'+label+'</span><span class="sum-v">'+v+'</span></div>';

// NAVIGATION
function jumpToField(key){
  var fieldMap={anrede:'Persönliche Daten',vorname:'Persönliche Daten',nachname:'Persönliche Daten',firmenname:'Unternehmen',rechtsform:'Unternehmen',ap_vn:'Ansprechpartner',ap_nn:'Ansprechpartner',email:'Kommunikation',strasse:'Adresse & Finanzamt',plz:'Adresse & Finanzamt',ort:'Adresse & Finanzamt',iban:'Bankverbindung'};
  var targetStep=fieldMap[key];
  if(targetStep){var idx=steps().indexOf(targetStep);if(idx>-1){currentStep=idx;renderAll();}}
}

function getPageContent(idx){
  var s=steps(),name=s[idx];
  if(idx===0) return pageType();
  if(name==='Persönliche Daten') return pagePerson();
  if(name==='Unternehmen') return pageCompany();
  if(name==='Ansprechpartner') return pageContact();
  if(name==='Familie & Kinder') return pageFamilie();
  if(name==='Kommunikation') return pageKomm();
  if(name==='Adresse & Finanzamt') return pageAddr();
  if(name==='Bankverbindung') return pageBank();
  if(name==='Leistungen') return pageLeistungen();
  if(name==='Zusammenfassung') return pageSummary();
  return '';
}

function renderAll(){
  var s=steps(),total=s.length;
  var nav=document.getElementById('stepsNav'),navHtml='';
  for(var i=0;i<s.length;i++){
    var stepErrs=i>0&&i<s.length-1?Object.keys(validateStep(s[i])).length>0:false;
    var cls='step-btn';
    if(i===currentStep) cls+=' active';
    else if(i<currentStep) cls+=' done';
    if(stepErrs&&i<currentStep) cls+=' has-error';
    navHtml+='<button class="'+cls+'" onclick="currentStep='+i+';renderAll()"><span class="step-num">'+(i+1)+'</span>'+s[i]+'</button>';
  }
  nav.innerHTML=navHtml;
  var pct=currentStep===0?0:Math.round(currentStep/(total-1)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('stepPct').textContent=pct+'%';
  document.getElementById('stepLabel').textContent='Schritt '+(currentStep+1)+' von '+total+' — '+s[currentStep];
  var pages=document.getElementById('pages');
  var html='<div>'+getPageContent(currentStep);
  if(currentStep===0&&!D.mtype){}
  else if(currentStep<total-1){
    html+='<div class="nav-bar">';
    if(currentStep>0) html+='<button class="btn-secondary" onclick="navigateStep(-1)">← Zurück</button>';
    html+='<button class="btn-primary" onclick="navigateStep(1)">Weiter →</button>';
    html+='</div>';
  } else {
    html+='<div class="nav-bar"><button class="btn-secondary" onclick="navigateStep(-1)">← Zurück</button>'+
    '<button class="btn-print" onclick="printPdf()">🖨 Als PDF speichern</button>'+
    '<button class="btn-export" onclick="exportJSON()">⬇ JSON Export</button></div>';
  }
  html+='</div>';
  pages.innerHTML=html;
}

function printPdf(){
  var last=steps().length-1;
  if(currentStep!==last){ currentStep=last; renderAll(); }
  var pd=document.getElementById('printDate'); if(pd) pd.textContent='Stand: '+new Date().toLocaleDateString('de-DE');
  setTimeout(function(){ window.print(); }, 180);
}

function navigateStep(dir){
  if(dir>0&&currentStep>0){
    var s=steps(),stepName=s[currentStep],errs=validateStep(stepName);
    if(Object.keys(errs).length>0){
      if(!D._err)D._err={};
      Object.keys(errs).forEach(function(k){D._err[k]=true;});
      renderAll();
      var firstErr=document.querySelector('.error,.err-msg.show');
      if(firstErr)firstErr.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  currentStep+=dir;
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

function exportJSON(){
  var isF=D.mtype==='firma';
  var nm=(isF?(D.firmenname||'firma'):((D.nachname||'')+'_'+(D.vorname||'')))||'export';
  nm=nm.replace(/[^a-zA-Z0-9_\-]+/g,'_');
  var blob=new Blob([JSON.stringify({meta:{erstellt:new Date().toISOString(),typ:D.mtype},daten:D},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='mandant_'+nm+'_'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
  if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();if(currentStep<steps().length-1)navigateStep(1);}
  if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();if(currentStep>0)navigateStep(-1);}
});

loadFromStorage();
pushHistory();
renderAll();
</script>
